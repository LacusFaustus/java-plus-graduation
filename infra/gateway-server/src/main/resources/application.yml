server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    config:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service routes
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**, /users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCB
                fallbackUri: forward:/fallback/users

        # Event Service routes
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**, /categories/**, /admin/compilations/**, /compilations/**, /admin/events/**, /events/**, /users/*/events/**
          filters:
            - name: CircuitBreaker
              args:
                name: eventServiceCB
                fallbackUri: forward:/fallback/events

        # Request Service routes
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**, /users/*/events/*/requests/**
          filters:
            - name: CircuitBreaker
              args:
                name: requestServiceCB
                fallbackUri: forward:/fallback/requests

        # Comment Service routes
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/comments/**, /admin/comments/**, /users/*/comments/**
          filters:
            - name: CircuitBreaker
              args:
                name: commentServiceCB
                fallbackUri: forward:/fallback/comments

        # Stats Service routes
        - id: stats-server
          uri: lb://stats-server
          predicates:
            - Path=/hit, /stats

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics